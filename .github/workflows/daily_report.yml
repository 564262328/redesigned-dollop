name: Financial Data Automation & Short URL Deploy

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 8 * * *'    # 4:00 PM Beijing Time
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f market_analysis/src/requirements.txt ]; then 
            pip install -r market_analysis/src/requirements.txt
          else
            pip install akshare pandas
          fi

      - name: Run main script
        working-directory: ./market_analysis/src
        run: python main.py

      - name: Move HTML to root for shorter URL
        run: |
          # Change index.html to your actual filename if it is different
          if [ -f market_analysis/src/index.html ]; then
            cp market_analysis/src/index.html ./index.html
            echo "Successfully moved index.html to root"
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: New data & homepage $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # Deploys everything from the root folder

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

















