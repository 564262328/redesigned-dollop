name: Quant Terminal Auto Deploy

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 8 * * *' # 每天下午4点运行
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: |
          pip install akshare pandas requests
          if [ -f market_analysis/src/requirements.txt ]; then pip install -r market_analysis/src/requirements.txt; fi

      - name: Run
        working-directory: ./market_analysis/src
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py

      - name: Push HTML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "update report" || exit 0
          git push

      - name: Deploy Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Finish Deploy
        uses: actions/deploy-pages@v4



















