name: Daily A-Share Analysis Report

on:
  schedule:
    - cron: '25 1 * * 1-5' # 北京时间 09:25
  workflow_dispatch:

jobs:
  analyze_market:
    runs-on: ubuntu-22.04 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install akshare>=1.18.40 pandas requests beautifulsoup4 lxml html5lib py_mini_racer cryptography

      - name: Execute Analysis & Push
        env:
          # 将 GitHub Secrets 映射给 Python 环境
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_ACCESS_TOKEN: ${{ secrets.DINGTALK_ACCESS_TOKEN }}
          SCKEY: ${{ secrets.SCKEY }}
        run: python market_analysis.py

      - name: Final Summary
        run: cat report.md >> $GITHUB_STEP_SUMMARY


