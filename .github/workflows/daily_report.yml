name: A-Share Quant Dashboard v13.3

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 7 * * 1-5"
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # 🛡️ Increased to prevent 'Timeout reached'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # ⚡ Speed up by only fetching the latest commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas akshare requests

      - name: Run Quant Analysis
        run: python market_analysis.py

      - name: Commit Database Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "stocks_db.json" ]; then
            git add stocks_db.json
            git commit -m "DB Sync: $(date)" || echo "No changes"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4








