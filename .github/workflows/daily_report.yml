name: Financial Data Automation

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 8 * * *'    # Runs daily at 4:00 PM Beijing Time
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # Updated to find requirements.txt inside your specific path
        run: |
          python -m pip install --upgrade pip
          if [ -f market_analysis/src/requirements.txt ]; then 
            pip install -r market_analysis/src/requirements.txt
          fi

      - name: Run main script
        # Set to your specific folder path
        working-directory: ./market_analysis/src
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: New data $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

















