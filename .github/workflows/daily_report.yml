name: A-Share Quant Dashboard v7.0

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 7 * * 1-5" # 北京時間週一至週五 15:30 運行
  workflow_dispatch: 

permissions:
  contents: write  # 🔑 必須改為 write 才能執行 git push
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 確保獲取完整的歷史記錄以利於 git push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests yfinance akshare

      - name: Run Quant Analysis
        run: python market_analysis.py

      # 🔄 在部署網頁前，先將資料庫變更存回倉庫
      - name: Commit Database Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          # 檢查檔案是否存在，避免報錯
          if [ -f "stocks_db.json" ]; then
            git add stocks_db.json
            git commit -m "Update stock database: $(date)" || echo "No changes to commit"
            git push
          else
            echo "stocks_db.json not found, skipping commit."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 包含 index.html 和更新後的 stocks_db.json

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4






