name: A-Share Quant Dashboard v14.0

on:
  push:
    branches: ["main"]
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas akshare requests

      - name: Run Quant Analysis
        # Ensure we run main.py from the root
        run: python main.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stocks_db.json index.html
          git commit -m "Auto-update market data: $(date)" || echo "No changes"
          git push origin main || echo "No changes"
        continue-on-error: true 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Simple '.' means the root folder where index.html is
          path: '.'

  deploy:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4













