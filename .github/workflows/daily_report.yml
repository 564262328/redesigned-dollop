name: Run Python App

on:
  push:
    branches: [ "main" ]  # Runs when you push to the main branch
  schedule:
    - cron: '0 0 * * *'    # Optional: Runs daily at midnight UTC
  workflow_dispatch:        # Allows you to run it manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Download your code from GitHub to the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up the Python environment
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install your third-party libraries (akshare, pandas)
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      # 4. Run the script inside the src folder
      - name: Run main script
        working-directory: ./src
        run: python main.py















