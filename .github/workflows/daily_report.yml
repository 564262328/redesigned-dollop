name: A-Share Quant Dashboard v13.3

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 7 * * 1-5"
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # 🛡️ Increased to prevent 'Timeout reached'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # ⚡ Speed up by only fetching the latest commit

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas akshare requests

      - name: Run Quant Analysis
        run: python market_analysis.py

      # --- 关键新增步骤 1: 上传生成的 index.html 到 artifact ---
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 告诉 GitHub 部署当前根目录下的 index.html

  # --- 关键新增任务 2: 执行部署 ---
  deploy:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4









