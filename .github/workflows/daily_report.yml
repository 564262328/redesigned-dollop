name: A-Share Quant Dashboard v13.1

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 7 * * 1-5" # 北京時間週一至週五 15:30 運行
  workflow_dispatch: 

permissions:
  contents: write  # 🔑 關鍵：必須設為 write 才能讓 git push 成功
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 獲取完整歷史以利於 Git Push

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests yfinance akshare

      - name: Run Quant Analysis
        run: python market_analysis.py

      # 🔄 將數據庫變更提交回倉庫 (確保對齊)
      - name: Commit Database Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "stocks_db.json" ]; then
            git add stocks_db.json
            git commit -m "Update stock database: $(date)" || echo "No changes to commit"
            git push
          else
            echo "stocks_db.json not found, skipping."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4





