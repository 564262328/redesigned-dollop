name: Industrial A-Share Analysis

on:
  schedule:
    - cron: '25 1 * * 1-5' # 北京时间 09:25
  workflow_dispatch:

jobs:
  analyze_job:
    runs-on: ubuntu-22.04 # 锁定稳定镜像
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # JS 引擎用于 AKShare 加密解析

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev
          python -m pip install --upgrade pip setuptools wheel
          # 必须安装 tenacity 库以支持重试机制
          pip install akshare>=1.18.40 pandas requests tenacity lxml html5lib py_mini_racer cryptography

      - name: Run Quant Engine
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DINGTALK_ACCESS_TOKEN: ${{ secrets.DINGTALK_ACCESS_TOKEN }}
          SCKEY: ${{ secrets.SCKEY }}
        run: python market_analysis.py

      - name: Report Summary
        run: cat report.md >> $GITHUB_STEP_SUMMARY


