name: Daily A-Share Analysis Report

on:
  schedule:
    # 01:25 UTC is 09:25 AM Beijing Time (HKT)
    # Runs Monday to Friday
    - cron: '25 1 * * 1-5'
  workflow_dispatch: # Allows manual triggering for testing

# Force workflow to use Node 24 to avoid deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze_market:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6 # Updated to v6 for Node 24 support

      - name: Setup Python
        uses: actions/setup-python@v6 # Updated to v6 for Node 24 support
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install akshare pandas

      - name: Execute Analysis Script
        run: python market_analysis.py

      - name: Upload Report as Artifact
        uses: actions/upload-artifact@v7 # Updated to v7 for latest performance/Node 24
        with:
          name: market-analysis-report-${{ github.run_id }}
          path: report.md

      - name: Post Summary
        run: cat report.md >> $GITHUB_STEP_SUMMARY
