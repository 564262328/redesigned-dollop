name: Daily A-Share Analysis Report

on:
  schedule:
    - cron: '25 1 * * 1-5' # 每天北京时间 09:25
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze_market:
    # 锁定稳定版本环境
    runs-on: ubuntu-22.04 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          # 注意：删掉了 cache: pip，因为我们不使用外部文件，避免报错

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # 直接在此安装所有必要库，彻底跳过对 requirements.txt 的搜索
          pip install akshare>=1.18.40 pandas requests beautifulsoup4 lxml html5lib py_mini_racer cryptography

      - name: Execute Analysis Script
        run: python market_analysis.py

      - name: Post Summary
        run: cat report.md >> $GITHUB_STEP_SUMMARY


