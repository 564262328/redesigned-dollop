name: A-Share Quant Dashboard v7.0

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 7 * * 1-5" # Runs at 15:30 Beijing time on weekdays
  workflow_dispatch: # Allows manual trigger

# 🔑 IMPORTANT: Permissions for GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Matches your environment

      - name: Install dependencies
        run: |
          pip install pandas requests yfinance # Add other libs your script needs

      - name: Run Quant Analysis
        run: python market_analysis.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads the folder containing index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4



