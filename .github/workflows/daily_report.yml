name: A-Share Quant Dashboard v14.0

on:
  push:
    branches: ["main"]
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas akshare requests

      - name: Run Quant Analysis
        run: |
          # Use find to locate main.py regardless of nesting
          SCRIPT_PATH=$(find . -name "main.py" | head -n 1)
          cd $(dirname $SCRIPT_PATH)
          python main.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add .
          git commit -m "Update $(date)" || echo "No changes"
          git push origin main || echo "No changes"
        continue-on-error: true 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # This finds where the index.html was actually generated
          path: $(dirname $(find . -name "index.html" | head -n 1))

  deploy:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4












