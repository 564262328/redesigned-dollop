name: Industrial A-Share Web Dashboard

on:
  schedule:
    - cron: '25 1 * * 1-5'
  workflow_dispatch:

# 必须开启 Pages 部署权限
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  analyze_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node & Python
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install akshare>=1.18.40 pandas requests tenacity lxml html5lib py_mini_racer cryptography

      - name: Generate Web Dashboard
        env:
          SCKEY: ${{ secrets.SCKEY }} # 仍保留推送功能
        run: python market_analysis.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 上传包含 index.html 的当前目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
