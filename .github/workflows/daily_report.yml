name: A-Share Quant Dashboard v13.3

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 7 * * 1-5" # Runs at 15:30 HKT (Close of Market)
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas akshare requests

      - name: Run Quant Analysis
        run: python market_analysis.py

      # IMPORTANT: Save the database changes back to your repo
      - name: Commit and Push Database
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stocks_db.json
          git commit -m "Update Market Data: $(date)" || echo "No changes to commit"
          git push origin main || echo "No changes to push"

      # NEW: Upload the generated index.html for deployment
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Uploads everything in the root (including index.html)

  # NEW: Separate deployment job to push to live site
  deploy:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4










