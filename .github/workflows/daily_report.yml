name: Daily A-Share Analysis Report

on:
  schedule:
    # 01:25 UTC is 09:25 AM Beijing Time (HKT)
    - cron: '25 1 * * 1-5'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze_market:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      # 关键修复：安装 Node.js 以提供 JS 运行时环境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'
          cache: 'pip'

      # 关键修复：安装系统级解析库依赖
      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Execute Analysis Script
        run: python market_analysis.py

      - name: Upload Report
        uses: actions/upload-artifact@v7
        with:
          name: market-analysis-report-${{ github.run_id }}
          path: report.md

      - name: Post Summary
        run: cat report.md >> $GITHUB_STEP_SUMMARY

