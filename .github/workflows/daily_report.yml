name: Daily A-Share Analysis Report

on:
  schedule:
    - cron: '25 1 * * 1-5' # 北京时间 09:25
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  analyze_market:
    runs-on: ubuntu-22.04 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11' # 升级到 3.11 以获得更好的解析支持

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxml2-dev libxslt-dev

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # 内联安装，包含所有必需的解析引擎
          pip install akshare>=1.18.40 pandas requests beautifulsoup4 lxml html5lib py_mini_racer cryptography

      - name: Run Market Analysis
        run: python market_analysis.py

      - name: Publish Summary
        run: cat report.md >> $GITHUB_STEP_SUMMARY


