name: A-Share Quant Dashboard v13.2

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 7 * * 1-5" # 15:30 Beijing Time
  workflow_dispatch: 

permissions:
  contents: write  # 🔑 Required to save the JSON database back to your repo
  pages: write     # 🔑 Required to publish the website
  id-token: write  # 🔑 Required for secure deployment

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas akshare requests

      - name: Run Quant Analysis
        run: python market_analysis.py

      # 🔄 Save Database Changes back to Repo
      - name: Commit Database Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          if [ -f "stocks_db.json" ]; then
            git add stocks_db.json
            git commit -m "Update stock database: $(date)" || echo "No changes to commit"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Must be '.' to include index.html at the root
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4







