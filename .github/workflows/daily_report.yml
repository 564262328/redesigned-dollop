name: A-Share Quant Dashboard v13.3

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "37 7 * * 1-5"cron: "12 8 * * 1-5" # 15:30 HKT (Market Close)
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas akshare requests

      - name: Run Quant Analysis
        run: python market_analysis.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # Add all changes (index.html, stocks_db.json, etc.)
          git add .
          
          # Only commit if there are actual changes to avoid "nothing to commit" errors
          if git diff --staged --quiet; then
            echo "No changes detected in data or database."
          else
            git commit -m "Auto Update: $(date +'%Y-%m-%d %H:%M')"
            git push origin main
          fi
        # The '|| true' ensures that even if Git fails, the deployment step still runs
        continue-on-error: true 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # Upload the directory containing index.html

  deploy:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4











