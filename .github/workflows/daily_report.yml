name: Financial Data Automation

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 8 * * *'    # Runs daily at 8:00 AM UTC (4:00 PM Beijing Time)
  workflow_dispatch:        # Allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # Required to push changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # If requirements.txt is in the root, use this:
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run main script
        # Running from the src directory so imports work
        working-directory: ./src
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Only commit if there are changes to avoid errors
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: New financial data $(date +'%Y-%m-%d %H:%M')"
            git push
          fi
















