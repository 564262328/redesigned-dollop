name: A-Share Quant Dashboard v14.2

on:
  push:
    branches: ["main"]
  workflow_dispatch: 

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas akshare requests

      - name: Run Analysis
        run: python main.py

      - name: Commit and Push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add stocks_db.json index.html
          git commit -m "Auto update: $(date)" || echo "No changes"
          git push origin main || echo "No changes"
        continue-on-error: true 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    needs: build_and_deploy
    runs-on: ubuntu-latest
    steps:
     - name: Checkout code
       uses: actions/checkout@v4
     - name: Run script
       run: python main.py
       working-directory: ./src  # Change this to the folder containing your script














