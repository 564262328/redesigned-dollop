name: Financial Data Automation & Pages Deploy

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 8 * * *'    # 每天北京时间下午4点运行
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f market_analysis/src/requirements.txt ]; then 
            pip install -r market_analysis/src/requirements.txt
          else
            pip install akshare pandas
          fi

      - name: Run main script
        working-directory: ./market_analysis/src
        run: python main.py

      - name: Prepare HTML for Pages
        run: |
          # 查找 src 目录下生成的任何 .html 文件并强制命名为根目录下的 index.html
          # 注意：如果你的脚本生成的 HTML 叫别的名字，这行会自动处理它
          find market_analysis/src -name "*.html" -exec cp {} ./index.html \;
          
          # 检查文件是否成功移动
          if [ -f index.html ]; then
            echo "Success: index.html is now in root."
          else
            echo "Error: No HTML file was found in market_analysis/src!"
            exit 1
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: New data & index.html $(date +'%Y-%m-%d %H:%M')"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # 部署根目录（包含刚才移动过来的 index.html）

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

















