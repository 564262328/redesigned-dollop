name: A-Share Quant Dashboard v7.0

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "30 7 * * 1-5" # 北京时间周一至周五 15:30 运行
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          # 关键：添加了 akshare，并建议升级 pip
          python -m pip install --upgrade pip
          pip install pandas requests yfinance akshare

      - name: Run Quant Analysis
        run: python market_analysis.py

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 包含生成的 index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4





