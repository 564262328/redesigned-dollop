name: Quant Terminal Deployment

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 8 * * *'  # 每天北京时间下午 4:00 自动运行
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests tenacity

      - name: Run Market Analysis
        working-directory: ./market_analysis/src
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        run: python main.py

      # --- 核心：自动备份历史报告 ---
      - name: Archive Historical Report
        run: |
          mkdir -p history_reports
          # 使用北京时间日期作为文件名 (GitHub Runner 默认是 UTC，这里加 8 小时处理或直接用日期)
          REPORT_DATE=$(date +'%Y-%m-%d')
          cp index.html history_reports/report_${REPORT_DATE}.html
          echo "✅ 历史报告已备份: history_reports/report_${REPORT_DATE}.html"

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 确保所有变动的文件（HTML、数据库、历史备份）都被添加
          git add index.html
          git add market_analysis/data/stocks_db.csv || true
          git add history_reports/
          
          if git diff --staged --quiet; then
            echo "✅ 没有发现文件变动，跳过推送。"
          else
            git commit -m "🚀 自动更新：部署 V14.7 并存档历史报告 [$(date +'%Y-%m-%d')]"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin ${GITHUB_REF_NAME}
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
























