name: Quant Terminal Deployment

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    # 每 20 分鐘運行一次，配合代碼中的 20 分鐘緩存邏輯
    - cron: '*/20 * * * *'
  workflow_dispatch: # 支持手動點擊運行

# 核心權限配置：必須開啟以允許 Actions 提交數據和部署 Pages
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    # 防止多個工作流同時跑產生的 Git 鎖定問題
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    
    steps:
      # 1. 檢出代碼 (獲取完整歷史以支持 rebase)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 設置 Python 環境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # 3. 安裝依賴
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary akshare pandas requests

      # 4. 運行量化分析主程序 (含智能緩存清理)
      - name: Run Market Analysis
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          PYTHONPATH: ${{ github.workspace }}/market_analysis/src
        run: |
          # 4.1 智能清理壞緩存
          if [ -f "market_cache.json" ]; then
            if grep -q "000001" market_cache.json || [ $(stat -c%s "market_cache.json") -lt 2048 ]; then
              echo "🧹 檢測到損壞數據，正在清理緩存..."
              rm -f market_cache.json
            fi
          fi

          # 4.2 執行主程序
          python market_analysis/src/main.py

      # 5. 【核心修復】提交並推送數據變動
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 5.1 強制將所有變動（含 index.html, market_cache.json, stocks_db.json 等）加入暫存
          # 這樣就不會出現 "unstaged changes" 導致 rebase 失敗的問題
          git add -A 
          
          # 5.2 檢查是否有任何變更需要提交
          if git diff --staged --quiet; then
            echo "✅ 今日數據無變化，跳過推送。"
          else
            git commit -m "🚀 自動更新：V15.8 PRO [多市場+緩存同步]"
            
            # 5.3 【神級參數】加入 --autostash
            # 即使拉取過程中產生細微衝突，也會自動隱藏並恢復，確保推送成功
            git pull --rebase --autostash origin ${GITHUB_REF_NAME}
            git push origin ${GITHUB_REF_NAME}
          fi

      # 6. 配置並部署到 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
