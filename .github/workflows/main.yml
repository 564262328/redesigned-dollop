name: Quant Terminal Deployment

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '*/20 * * * *' # 每 20 分鐘運行一次
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: quant-deployment
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary akshare pandas requests

      - name: Run Market Analysis
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          # 💡 關鍵：設置 PYTHONPATH，讓 Python 能解析 market_analysis 資料夾下的包
          PYTHONPATH: ${{ github.workspace }}/market_analysis
        run: |
          # 1. 智能清理損壞緩存
          if [ -f "market_cache.json" ]; then
            if grep -q "000001" market_cache.json || [ $(stat -c%s "market_cache.json") -lt 2048 ]; then
              echo "🧹 清理異常緩存..."
              rm -f market_cache.json
            fi
          fi

          # 2. 指定路徑運行 main.py
          python market_analysis/src/main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 抓取所有變動 (index.html, market_cache.json)
          git add -A 
          
          if git diff --staged --quiet; then
            echo "✅ 數據無變化，跳過推送。"
          else
            git commit -m "🚀 自動更新：復盤數據 [$(date +'%Y-%m-%d %H:%M')]"
            git pull --rebase --autostash origin ${GITHUB_REF_NAME}
            git push origin ${GITHUB_REF_NAME}
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署根目錄下的 index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4



































