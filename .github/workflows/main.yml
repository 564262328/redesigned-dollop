name: Quant Terminal Deployment

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install akshare pandas requests tenacity

      - name: Run Market Analysis
        working-directory: ./market_analysis/src
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 强制同步 index.html 和 数据库
          git add index.html
          git add market_analysis/data/stocks_db.csv || true
          
          if git diff --staged --quiet; then
            echo "No changes found"
          else
            git commit -m "🚀 部署量化看板 V14.6 (包含搜索与路径修正)"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署仓库根目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4




















