name: Quant Terminal Deployment

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 8 * * *'  # 每天北京时间下午 4:00 自动运行
  workflow_dispatch:      # 支持手动点击运行

# 核心权限配置：必须开启写入权限，否则无法自动提交代码或发布网页
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码
      # fetch-depth: 0 非常重要，否则 git pull --rebase 会因为缺少历史记录而报错
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Python 环境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装依赖库
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests tenacity

      # 4. 运行量化分析主程序
      - name: Run Market Analysis
        working-directory: ./market_analysis/src
        env:
          # 请确保在 GitHub Settings -> Secrets 中已配置好这两项
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        run: python main.py

      # 5. 提交并推送生成的 HTML 和 数据库
      # 解决了 "Your index contains uncommitted changes" 报错
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 确保数据目录存在（防止初次运行报错）
          mkdir -p market_analysis/data
          
          # 将生成的网页和数据库添加到暂存区
          git add index.html
          git add market_analysis/data/stocks_db.csv || true
          
          # 检查是否有文件变动
          if git diff --staged --quiet; then
            echo "✅ 没有发现文件变动，跳过推送。"
          else
            # 顺序：先 commit 本地更改，再 pull 远程更新，最后 push
            git commit -m "🚀 自动更新：部署量化看板 V14.6"
            git pull --rebase origin main
            git push origin main
          fi

      # 6. 配置并部署到 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署包含 index.html 的仓库根目录

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4






















