name: Quant Terminal Deployment

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '30 1 * * 1-5' # 北京時間 09:30
    - cron: '0 8 * * 1-5'  # 北京時間 16:00
  workflow_dispatch:

permissions:
  contents: write    # <--- 重要：必須有這個權限才能推送代碼
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests

      # 4. 運行量化分析主程序
      - name: Run Market Analysis
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          PYTHONPATH: ${{ github.workspace }}/market_analysis/src
        run: |
          # 這裡會生成 index.html 和 market_cache.json
          python market_analysis/src/main.py

      # ==========================================
      # 5. 【就是加在這裡】提交並推送數據變動 (包含緩存文件)
      # ==========================================
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 將生成的緩存文件也加入 Git，這樣下次運行就能讀到
          git add index.html market_cache.json
          
          if git diff --staged --quiet; then
            echo "✅ 今日數據與緩存均無變化，跳過推送。"
          else
            git commit -m "🚀 自動更新：V15.8 PRO [多市場+緩存同步]"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin ${GITHUB_REF_NAME}
          fi

      # 6. 後續的部署步驟...
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4






























