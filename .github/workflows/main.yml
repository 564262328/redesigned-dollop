name: Quant Terminal Deployment

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    # 北京时间周一至周五 09:30 (开盘数据同步)
    - cron: '30 1 * * 1-5'
    # 北京时间周一至周五 16:00 (盘后 AI 深度复盘)
    - cron: '0 8 * * 1-5'
  workflow_dispatch: # 支持手动点击运行

# 核心权限配置
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 检出代码 (获取完整历史以支持 rebase 推送)
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. 设置 Python 环境
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. 安装量化与 AI 依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests tenacity

      # 4. 运行量化分析主程序
      - name: Run Market Analysis
        working-directory: ./market_analysis/src
        env:
          # 必须在 GitHub Settings -> Secrets 中配置以下两项
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
        run: python main.py

      # 5. 自动备份历史报告
      - name: Archive Historical Report
        run: |
          mkdir -p history_reports
          # 备份当天的 HTML 报告
          REPORT_DATE=$(date +'%Y-%m-%d')
          cp index.html history_reports/report_${REPORT_DATE}.html
          echo "✅ 历史报告已存档: report_${REPORT_DATE}.html"

      # 6. 提交并推送数据变动
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 确保关键文件和文件夹被纳入版本管理
          git add index.html
          git add market_analysis/data/stocks_db.csv || true
          git add history_reports/
          
          if git diff --staged --quiet; then
            echo "✅ 今日数据无变化，跳过推送。"
          else
            # 顺序：提交 -> 拉取并合并 -> 推送
            git commit -m "🚀 自动更新：部署 V15.5 实时版 [$(date +'%Y-%m-%d %H:%M')]"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin ${GITHUB_REF_NAME}
          fi

      # 7. 配置并部署到 GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署仓库根目录下的 index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

























