name: Quant Terminal Deployment

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '*/20 * * * *' # 每 20 分鐘執行一次（配合你的緩存機制）
  workflow_dispatch:

# 【核心權限】必須加入這兩行，否則第 5 步會報錯 Permission Denied
permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 獲取完整歷史以支持 push

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install akshare pandas requests

      # ==========================================
      # 4. 運行量化分析主程序（就在這裡插入）
      # ==========================================
      - name: Run Market Analysis
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          PYTHONPATH: ${{ github.workspace }}/market_analysis/src
        run: |
          python market_analysis/src/main.py

      # ==========================================
      # 5. 提交變動並將緩存文件 Push 回倉庫（緊跟在運行之後）
      # ==========================================
      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 只有文件存在時才 add，防止 128 報錯
          [ -f "index.html" ] && git add index.html
          [ -f "market_cache.json" ] && git add market_cache.json
          
          if git diff --staged --quiet; then
            echo "✅ 今日數據與緩存均無變化，跳過推送。"
          else
            git commit -m "🚀 自動更新：V15.8 PRO [多市場+緩存同步]"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin ${GITHUB_REF_NAME}
          fi

      # ==========================================
      # 6. 配置並部署到 GitHub Pages（最後步驟）
      # ==========================================
      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4






























