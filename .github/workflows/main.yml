name: Quant Terminal Deployment

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '30 1 * * 1-5' # 北京时间 09:30
    - cron: '0 8 * * 1-5'  # 北京时间 16:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary akshare pandas requests tenacity

      - name: Run Market Analysis
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          PYTHONPATH: ${{ github.workspace }}/market_analysis/src
        run: |
          # 1. 强制清理：删除根目录和 src 目录下的所有旧 index.html
          echo "🧹 清理旧报告..."
          rm -f ./index.html
          rm -f market_analysis/src/index.html
          
          # 2. 运行程序
          python market_analysis/src/main.py
          
          # 3. [保底搬运] 如果根目录没生成，从 src 目录暴力抓取
          if [ ! -f "./index.html" ]; then
            echo "⚠️ 根目录没发现报告，尝试从 src 目录搬运..."
            cp market_analysis/src/index.html ./index.html || echo "❌ 源码目录也找不到报告"
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 检查根目录，确认 index.html 存在
          echo "🔍 检查根目录文件列表:"
          ls -F
          
          if [ ! -f "index.html" ]; then
            echo "❌ 致命错误：index.html 彻底失踪了！程序可能运行失败。"
            exit 1
          fi
          
          git add index.html
          
          # 备份历史 (可选)
          mkdir -p history_reports
          cp index.html history_reports/report_$(date +'%Y-%m-%d').html || true
          git add history_reports/
          
          if git diff --staged --quiet; then
            echo "⚠️ 今日数据无变化，更新终止。"
            exit 1 # 强制报错，避免虚假成功
          else
            git commit -m "🚀 修复路径并部署 V15.8 [$(date +'%Y-%m-%d %H:%M')]"
            git pull --rebase origin ${GITHUB_REF_NAME}
            git push origin ${GITHUB_REF_NAME}
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署根目录下的 index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4





























