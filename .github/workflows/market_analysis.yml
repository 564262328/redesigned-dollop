name: Quant Terminal Deployment

on:
  push:
    branches: [ "main", "master", "market_analysis" ]
  schedule:
    - cron: '0 * * * *' # 建议改为每小时执行一次，节省 AI 额度并防止部署冲突
  workflow_dispatch:      # 允许手动点击按钮执行

# 核心修正：处理并发冲突，确保同一时间只有一个部署在跑
concurrency:
  group: "pages"
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary akshare pandas requests numpy yfinance

      - name: Run Market Analysis
        env:
          # 从 GitHub Secrets 读取敏感信息
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          MAIRUI_KEY: ${{ secrets.MAIRUI_KEY }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          # 关键：设置 PYTHONPATH 解决导入错误
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/market_analysis
        run: |
          # 1. 修复 Python 包标识符
          touch market_analysis/__init__.py || true
          touch market_analysis/src/__init__.py || true
          touch market_analysis/data_provider/__init__.py || true

          # 2. 运行主程序
          python market_analysis/src/main.py
          
          # 3. 诊断检查：确认 index.html 是否生成在根目录
          echo "--- 检查生成的 index.html ---"
          if [ -f "index.html" ]; then
            ls -l index.html
          else
            echo "❌ 错误：未发现 index.html，搜索全仓库..."
            find . -name "index.html"
          fi

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 强制添加 index.html 和缓存文件，即使它们在 .gitignore 里
          git add index.html market_cache.json --force || true
          
          if git diff --staged --quiet; then
            echo "✅ 记录无变化，跳过推送。"
          else
            git commit -m "🚀 自动化复盘：更新看板 [$(date +'%Y-%m-%d %H:%M')]"
            # 解决分支推送冲突
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 必须设置为 '.' 代表根目录，以便包含 index.html
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4









































