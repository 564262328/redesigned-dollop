name: Quant Terminal Deployment

on:
  push:
    branches: [ "main", "master", "market_analysis" ]
  schedule:
    - cron: '0 * * * *' # Run hourly to save API credits
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install akshare pandas requests numpy yfinance

      - name: Run Analysis
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          MAIRUI_KEY: ${{ secrets.MAIRUI_KEY }}
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/market_analysis
        run: |
          # Ensure package structure
          touch market_analysis/__init__.py
          touch market_analysis/src/__init__.py
          touch market_analysis/data_provider/__init__.py
          
          # Run script
          python market_analysis/src/main.py
          
          # Verify file creation
          ls -l index.html || exit 1

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Force add files
          git add index.html market_cache.json --force || true
          
          if git diff --staged --quiet; then
            echo "No changes found."
          else
            git commit -m "🚀 Terminal Update [$(date +'%Y-%m-%d %H:%M')]"
            git push origin ${{ github.ref_name }}
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4









































