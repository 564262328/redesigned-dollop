name: Quant Terminal Deployment

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    # 每 20 分鐘執行一次，與緩存邏輯同步
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: quant-deployment
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --prefer-binary akshare pandas requests numpy

      - name: Run Market Analysis
        env:
          # 關鍵：從 GitHub Secrets 注入所有 API 密鑰
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILLY_API_KEY: ${{ secrets.TAVILLY_API_KEY }}
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          SEARXNG_URL: ${{ secrets.SEARXNG_URL }}
          # 設置路徑搜尋起點
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/market_analysis
        run: |
          # 1. 智能清理損壞緩存
          if [ -f "market_cache.json" ]; then
            if grep -q "000001" market_cache.json || [ $(stat -c%s "market_cache.json") -lt 2048 ]; then
              rm -f market_cache.json
            fi
          fi

          # 2. 強行補全包標識符 (防止 ModuleNotFoundError 的終極手段)
          touch market_analysis/__init__.py || true
          touch market_analysis/src/__init__.py || true
          touch market_analysis/data_provider/__init__.py || true

          # 3. 執行主程序
          python market_analysis/src/main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 抓取所有變動 (index.html, market_cache.json)
          git add -A 
          
          if git diff --staged --quiet; then
            echo "✅ 數據穩定，跳過推送。"
          else
            git commit -m "🚀 自動復盤：[2026-03-19] 多市場動態更新"
            # 使用 autostash 處理 Actions 運行期間產生的微小衝突
            git pull --rebase --autostash origin ${GITHUB_REF_NAME}
            git push origin ${GITHUB_REF_NAME}
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' # 部署根目錄下的 index.html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4







































