name: Quant Terminal Deployment

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: quant-deployment
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 這裡必須加入 yfinance
          pip install --prefer-binary akshare pandas requests numpy yfinance


      - name: Run Market Analysis
        env:
          AI_API_KEY: ${{ secrets.AI_API_KEY }}
          AI_BASE_URL: ${{ secrets.AI_BASE_URL }}
          BOCHA_API_KEYS: ${{ secrets.BOCHA_API_KEYS }}
          TAVILLY_API_KEY: ${{ secrets.TAVILLY_API_KEY }}
          SERP_API_KEY: ${{ secrets.SERP_API_KEY }}
          # 設置路徑搜尋起點
          PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/market_analysis
        run: |
          # 1. 強行補全包標識符
          touch market_analysis/__init__.py || true
          touch market_analysis/src/__init__.py || true
          touch market_analysis/data_provider/__init__.py || true

          # 2. 執行主程序
          python market_analysis/src/main.py
          
          # 3. 【新增：除錯診斷】檢查檔案到底有沒有生成
          echo "--- 檔案生成檢查 ---"
          if [ -f "index.html" ]; then
            echo "✅ 成功在根目錄發現 index.html"
            ls -l index.html
          else
            echo "❌ 錯誤：根目錄未發現 index.html"
            find . -name "index.html"
          fi

          # 2. 強行補全包標識符 (防止 ModuleNotFoundError 的終極手段)
          touch market_analysis/__init__.py || true
          touch market_analysis/src/__init__.py || true
          touch market_analysis/data_provider/__init__.py || true

          # 3. 執行主程序
          python market_analysis/src/main.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 強制添加生成的 index.html 和 緩存檔案
          git add index.html market_cache.json --force || true
          
          # 檢查是否有變動
          if git diff --staged --quiet; then
            echo "✅ 數據無變化，跳過推送。"
          else
            git commit -m "🚀 自動同步：V15.8 PRO [數據與伺服器]"
            # 使用更安全的推送方式
            git pull --rebase origin ${{ github.ref_name }}
            git push origin ${{ github.ref_name }}
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4








































